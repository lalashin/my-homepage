<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Mode - My Homepage</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #e5e7eb;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--bg), #020617);
      color: var(--text);
      font-family: "Segoe UI", Arial, sans-serif;
    }

    .card {
      width: min(92vw, 560px);
      padding: 40px;
      border-radius: 16px;
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.2);
      text-align: center;
    }

    .mode-badge {
      display: inline-block;
      margin-bottom: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #1f1127;
      background: #f0abfc;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
    }

    p {
      margin: 0 0 28px;
      color: #cbd5e1;
    }

    .cta-button {
      border: 0;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background-color: var(--accent);
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.2s ease;
    }

    .cta-button:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
    }

    .cta-button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <main class="card">
    <span class="mode-badge">CHAT MODE</span>
    <h1>내 개인 홈페이지</h1>
    <p>아래 버튼을 눌러 환영 메시지를 확인해보세요.</p>
    <button class="cta-button" id="welcomeButton" type="button">눌러보기</button>
  </main>

  <script>
    const welcomeButton = document.getElementById("welcomeButton");

    welcomeButton.addEventListener("click", () => {
      alert("방문해주셔서 감사합니다!");
    });
  </script>
</body>
</html>
